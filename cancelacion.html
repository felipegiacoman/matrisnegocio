<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="cfg-page-title">Cancelar Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --oro: #b59a7a; --crema: #f2ece4; --texto: #2d2d2d; --oscuro: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--crema); color: var(--texto); padding-top: 80px; }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }
        .btn-gold { background: var(--oro); color: white; border: none; padding: 10px 20px; text-transform: uppercase; font-size: 0.65rem; }
        .sugerencias-container { position: absolute; z-index: 1050; background: white; width: 100%; border: 1px solid var(--oro); display: none; }
        .sugerencia-item { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; }
        .sugerencia-item:hover { background: var(--crema); }
    </style>
</head>
<body>
    <nav class="navbar fixed-top bg-white shadow-sm"><div class="container"><a class="navbar-brand serif fw-bold" href="index.html">A <span style="color:var(--oro)">&</span> F</a></div></nav>
    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <h2 class="serif mb-4">Cancelar Asistencia</h2>
                <div id="seleccion-modo" class="d-flex gap-3 justify-content-center mb-4">
                    <button id="btn-solo" class="btn-gold">Cancelar solo mi asistencia</button>
                    <button id="btn-grupo" class="btn-gold">Cancelar grupo familiar</button>
                </div>
                <form id="cancelacionForm" class="box-datos p-4 border bg-white" style="display:none;">
                    <div id="lista-cancelacion-dinamica"></div>
                    <button type="button" id="btn-agregar-familiar" class="btn-gold mt-2" style="display:none;">Agregar otro</button>
                    <div id="datos-contacto-seccion" class="mt-4 pt-4 border-top" style="display:none;">
                        <textarea class="form-control mb-3" id="mensajeCancelacion" placeholder="Mensaje para los novios"></textarea>
                        <button type="submit" class="btn-gold w-100">Enviar Cancelación</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <script>
        let SCRIPT_URL = "", listaNombresGlobal = [];
        async function init() {
            const cfg = await (await fetch('config.json')).json();
            SCRIPT_URL = cfg.worker_url;
            const data = await (await fetch(SCRIPT_URL)).json();
            listaNombresGlobal = data.map(i => i.nombre_invitado);
        }
        init();
        let contador = 0;
        const listaDinamica = document.getElementById('lista-cancelacion-dinamica');
        function agregarBloque() {
            contador++;
            listaDinamica.insertAdjacentHTML('beforeend', `<div class="mb-3 position-relative" id="block-${contador}"><input type="text" class="form-control nombre-buscar" placeholder="Busca tu nombre..." required><div class="sugerencias-container"></div></div>`);
            const bloque = document.getElementById(`block-${contador}`), input = bloque.querySelector('.nombre-buscar'), box = bloque.querySelector('.sugerencias-container');
            input.addEventListener('input', function() {
                const filtrados = listaNombresGlobal.filter(n => n.toLowerCase().includes(this.value.toLowerCase()));
                box.innerHTML = filtrados.map(n => `<div class="sugerencia-item">${n}</div>`).join('');
                box.style.display = filtrados.length ? 'block' : 'none';
            });
            box.onclick = function(e) { input.value = e.target.innerText; box.style.display = 'none'; document.getElementById('datos-contacto-seccion').style.display = 'block'; };
        }
        document.getElementById('btn-solo').onclick = () => { listaDinamica.innerHTML = ''; contador=0; agregarBloque(); document.getElementById('cancelacionForm').style.display = 'block'; document.getElementById('btn-agregar-familiar').style.display = 'none'; };
        document.getElementById('btn-grupo').onclick = () => { listaDinamica.innerHTML = ''; contador=0; agregarBloque(); document.getElementById('cancelacionForm').style.display = 'block'; document.getElementById('btn-agregar-familiar').style.display = 'block'; };
        document.getElementById('btn-agregar-familiar').onclick = agregarBloque;
        document.getElementById('cancelacionForm').onsubmit = function(e) {
            e.preventDefault();
            const nombres = Array.from(document.querySelectorAll('.nombre-buscar')).map(i => ({nombre: i.value}));
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ tipo: "cancelacion", invitados: nombres }) }).then(() => { alert("Cancelado."); location.href = "index.html"; });
        };
    </script>
</body>
</html>
