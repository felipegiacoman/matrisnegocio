<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="cfg-page-title">Cargando Matrimonio...</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --oro: #b59a7a; --crema: #f2ece4; --texto: #2d2d2d; --oscuro: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--crema); color: var(--texto); overflow-x: hidden; }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }
        .hero { height: 100vh; background: linear-gradient(rgba(242, 236, 228, 0.2), rgba(242, 236, 228, 0.5)), url('fondo.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-content { background: rgba(255, 255, 255, 0.8); padding: 3rem; backdrop-filter: blur(5px); }
        .btn-gold { background: var(--oro); color: white; padding: 10px 25px; text-transform: uppercase; border: none; font-size: 0.8rem; letter-spacing: 1px; }
        .sugerencias-container { position: absolute; z-index: 1050; background: white; width: 100%; border: 1px solid var(--oro); display: none; }
        .sugerencia-item { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; }
        .sugerencia-item:hover { background: var(--crema); }
    </style>
</head>
<body>
    <nav class="navbar fixed-top bg-white shadow-sm"><div class="container"><a class="navbar-brand serif fw-bold" href="#">A & F</a></div></nav>
    <header class="hero"><div class="hero-content" data-aos="fade-up"><h1 id="cfg-nombres-hero">Antonia & Felipe</h1></div></header>

    <section class="container py-5" id="rsvp">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="serif text-center mb-4">Confirmar Asistencia</h2>
                <div class="d-flex gap-2 justify-content-center mb-4">
                    <button id="btn-solo" class="btn-gold">Solo</button>
                    <button id="btn-grupo" class="btn-gold">Grupo</button>
                </div>
                <form id="rsvpForm" class="p-4 border bg-white" style="display:none;">
                    <div id="lista-invitados-dinamica"></div>
                    <button type="button" id="btn-agregar-familiar" class="btn-gold w-100 mb-3" style="display:none;">+ Agregar Familiar</button>
                    <button type="submit" id="btn-enviar-rsvp" class="btn-gold w-100 bg-dark">Enviar Confirmación</button>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        let SCRIPT_URL = "", listaInvitadosGlobal = [];
        async function init() {
            try {
                const cfg = await (await fetch('config.json')).json();
                SCRIPT_URL = cfg.worker_url;
                const res = await fetch(SCRIPT_URL);
                listaInvitadosGlobal = await res.json();
            } catch(e) { console.error("Error cargando datos", e); }
        }
        init();

        let contador = 0;
        const listaDinamica = document.getElementById('lista-invitados-dinamica');
        
        function crearBloque(id) {
            return `
            <div class="bloque-invitado mb-3 p-3 border" id="inv-${id}">
                <div class="position-relative">
                    <input type="text" class="form-control nombre-buscar" placeholder="Escribe tu nombre..." required>
                    <div class="sugerencias-container"></div>
                </div>
                <div class="datos-extra mt-2" style="display:none;">
                    <input type="text" class="form-control mb-2" name="rut" placeholder="RUT">
                    <input type="email" class="form-control mb-2" name="email" placeholder="Email">
                    <div class="seccion-pareja" style="display:none;">
                        <input type="checkbox" class="check-pareja"> Voy con pareja
                        <div class="campo-pareja" style="display:none;"><input type="text" class="form-control" name="nombre_pareja" placeholder="Nombre Pareja"></div>
                    </div>
                </div>
            </div>`;
        }

        function agregarInvitado() {
            contador++;
            listaDinamica.insertAdjacentHTML('beforeend', crearBloque(contador));
            const bloque = document.getElementById(`inv-${contador}`), input = bloque.querySelector('.nombre-buscar'), box = bloque.querySelector('.sugerencias-container');
            
            input.addEventListener('input', function() {
                const filtrados = listaInvitadosGlobal.filter(n => n.nombre_invitado.toLowerCase().includes(this.value.toLowerCase()));
                box.innerHTML = filtrados.map(n => `<div class="sugerencia-item" data-nombre="${n.nombre_invitado}" data-permite="${n.permite_pareja}">${n.nombre_invitado}</div>`).join('');
                box.style.display = filtrados.length ? 'block' : 'none';
            });

            box.onclick = function(e) {
                const inv = listaInvitadosGlobal.find(i => i.nombre_invitado === e.target.dataset.nombre);
                input.value = inv.nombre_invitado;
                box.style.display = 'none';
                bloque.querySelector('.datos-extra').style.display = 'block';
                bloque.querySelector('.seccion-pareja').style.display = (parseInt(inv.permite_pareja) === 1) ? 'block' : 'none';
            };
            bloque.querySelector('.check-pareja').onchange = function() { bloque.querySelector('.campo-pareja').style.display = this.checked ? 'block' : 'none'; };
        }

        document.getElementById('btn-solo').onclick = () => { listaDinamica.innerHTML=''; contador=0; agregarInvitado(); document.getElementById('rsvpForm').style.display='block'; };
        document.getElementById('btn-grupo').onclick = () => { listaDinamica.innerHTML=''; contador=0; agregarInvitado(); document.getElementById('rsvpForm').style.display='block'; document.getElementById('btn-agregar-familiar').style.display='block'; };
        document.getElementById('btn-agregar-familiar').onclick = agregarInvitado;

        document.getElementById('rsvpForm').onsubmit = function(e) {
            e.preventDefault();
            for(let b of document.querySelectorAll('.bloque-invitado')) {
                if(!listaInvitadosGlobal.find(i => i.nombre_invitado === b.querySelector('.nombre-buscar').value)) { 
                    alert("Por favor, selecciona un nombre válido del listado desplegable."); return; 
                }
            }
            alert("Confirmando...");
        };
    </script>
</body>
</html>
