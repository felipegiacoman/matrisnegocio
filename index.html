<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="cfg-page-title">Antonia & Felipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --oro: #b59a7a; --crema: #f2ece4; --texto: #2d2d2d; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--crema); }
        .btn-gold { background: var(--oro); color: white; border: none; padding: 10px 20px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }
        .sugerencias-container { position: absolute; z-index: 1050; background: white; width: 95%; border: 1px solid var(--oro); display: none; }
        .sugerencia-item { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <section class="container py-5" id="rsvp">
        <h2 class="serif text-center mb-4">Confirmar Asistencia</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="d-flex gap-2 justify-content-center mb-4">
                    <button id="btn-solo" class="btn-gold">Confirmar solo</button>
                    <button id="btn-grupo" class="btn-gold bg-dark">Grupo Familiar</button>
                </div>
                <form id="rsvpForm" style="display:none;" class="p-4 border bg-white">
                    <div id="lista-invitados-dinamica"></div>
                    <button type="button" id="btn-agregar" class="btn-gold w-100 mb-3" style="display:none;">+ Agregar Familiar</button>
                    <button type="submit" class="btn-gold w-100 bg-dark">Enviar Confirmación</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        let listaInvitadosGlobal = [], SCRIPT_URL = "";
        
        // Inicialización
        async function init() {
            const cfg = await (await fetch('config.json')).json();
            SCRIPT_URL = cfg.worker_url;
            listaInvitadosGlobal = await (await fetch(SCRIPT_URL)).json();
        }
        init();

        function crearBloque() {
            const id = Math.random();
            return `
            <div class="bloque-invitado mb-3 p-3 border" id="inv-${id}">
                <div class="position-relative">
                    <input type="text" class="form-control nombre-buscar" placeholder="Escribe tu nombre..." required>
                    <div class="sugerencias-container"></div>
                </div>
                <div class="datos-extra mt-2" style="display:none;">
                    <input type="text" class="form-control mb-2" name="rut" placeholder="RUT">
                    <div class="seccion-pareja" style="display:none;">
                        <input type="checkbox" class="check-pareja"> Voy con pareja
                        <div class="campo-pareja" style="display:none;"><input type="text" class="form-control mt-2" name="nombre_pareja" placeholder="Nombre Pareja"></div>
                    </div>
                </div>
            </div>`;
        }

        // Lógica de búsqueda y pareja
        document.addEventListener('input', e => {
            if(!e.target.classList.contains('nombre-buscar')) return;
            const b = e.target.parentElement, box = b.querySelector('.sugerencias-container');
            const filtrados = listaInvitadosGlobal.filter(n => n.nombre_invitado.toLowerCase().includes(e.target.value.toLowerCase()));
            box.innerHTML = filtrados.map(n => `<div class="sugerencia-item" data-nombre="${n.nombre_invitado}" data-permite="${n.permite_pareja}">${n.nombre_invitado}</div>`).join('');
            box.style.display = filtrados.length ? 'block' : 'none';
        });

        document.addEventListener('click', e => {
            if(e.target.classList.contains('sugerencia-item')) {
                const b = e.target.closest('.bloque-invitado');
                b.querySelector('.nombre-buscar').value = e.target.dataset.nombre;
                b.querySelector('.sugerencias-container').style.display = 'none';
                b.querySelector('.datos-extra').style.display = 'block';
                b.querySelector('.seccion-pareja').style.display = (parseInt(e.target.dataset.permite) === 1) ? 'block' : 'none';
            }
        });

        // Toggle Pareja
        document.addEventListener('change', e => {
            if(e.target.classList.contains('check-pareja')) {
                e.target.nextElementSibling.style.display = e.target.checked ? 'block' : 'none';
            }
        });

        document.getElementById('btn-solo').onclick = () => { 
            const d = document.getElementById('lista-invitados-dinamica'); d.innerHTML = crearBloque(); 
            document.getElementById('rsvpForm').style.display='block'; document.getElementById('btn-agregar').style.display='none'; 
        };
        document.getElementById('btn-grupo').onclick = () => { 
            const d = document.getElementById('lista-invitados-dinamica'); d.innerHTML = crearBloque(); 
            document.getElementById('rsvpForm').style.display='block'; document.getElementById('btn-agregar').style.display='block'; 
        };
        document.getElementById('btn-agregar').onclick = () => { document.getElementById('lista-invitados-dinamica').insertAdjacentHTML('beforeend', crearBloque()); };
    </script>
</body>
</html>
