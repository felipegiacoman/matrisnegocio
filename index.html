<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="cfg-page-title">Antonia & Felipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --oro: #b59a7a; --crema: #f2ece4; --texto: #2d2d2d; --oscuro: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--crema); color: var(--texto); overflow-x: hidden; }
        .btn-gold { background: var(--oro); color: white; border: none; padding: 10px 20px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }
        .sugerencias-container { position: absolute; z-index: 1050; background: white; width: 95%; border: 1px solid var(--oro); display: none; }
        .sugerencia-item { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; }
        .sugerencia-item:hover { background: var(--crema); }
    </style>
</head>
<body>
    <nav class="navbar fixed-top bg-white shadow-sm"><div class="container"><a class="navbar-brand serif fw-bold" href="#">A & F</a></div></nav>
    <div class="container py-5 mt-5">
        <h2 class="text-center serif mb-4">Confirmar Asistencia</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="d-flex gap-2 justify-content-center mb-4">
                    <button id="btn-solo" class="btn-gold">Confirmar solo por mí</button>
                    <button id="btn-grupo" class="btn-gold" style="background:var(--oscuro)">Confirmar grupo familiar</button>
                </div>
                <form id="rsvpForm" class="p-4 border bg-white shadow-sm" style="display:none;">
                    <div id="lista-invitados-dinamica"></div>
                    <button type="button" id="btn-agregar" class="btn-gold w-100 mb-3" style="display:none;">+ Agregar Familiar</button>
                    <button type="submit" class="btn-gold w-100 bg-dark">Enviar Confirmación</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let listaInvitadosGlobal = [], SCRIPT_URL = "";
        async function init() {
            const cfg = await (await fetch('config.json')).json();
            SCRIPT_URL = cfg.worker_url;
            listaInvitadosGlobal = await (await fetch(SCRIPT_URL)).json();
        }
        init();

        function crearBloque() {
            const id = Math.random();
            return `
            <div class="bloque-invitado mb-3 p-3 border" id="inv-${id}">
                <div class="position-relative">
                    <input type="text" class="form-control nombre-buscar" placeholder="Escribe tu nombre..." required>
                    <div class="sugerencias-container"></div>
                </div>
                <div class="datos-extra mt-2" style="display:none;">
                    <input type="text" class="form-control mb-2" name="rut" placeholder="RUT">
                    <input type="email" class="form-control mb-2" name="email" placeholder="Email">
                    <div class="seccion-pareja" style="display:none;">
                        <input type="checkbox" class="check-pareja"> Voy con pareja
                        <div class="campo-pareja" style="display:none;"><input type="text" class="form-control mt-2" name="nombre_pareja" placeholder="Nombre Pareja"></div>
                    </div>
                </div>
            </div>`;
        }

        function setupBloque(b) {
            const input = b.querySelector('.nombre-buscar'), box = b.querySelector('.sugerencias-container');
            input.oninput = function() {
                const filtrados = listaInvitadosGlobal.filter(n => n.nombre_invitado.toLowerCase().includes(this.value.toLowerCase()));
                box.innerHTML = filtrados.map(n => `<div class="sugerencia-item" data-nombre="${n.nombre_invitado}" data-permite="${n.permite_pareja}">${n.nombre_invitado}</div>`).join('');
                box.style.display = filtrados.length ? 'block' : 'none';
            };
            box.onclick = function(e) {
                const inv = listaInvitadosGlobal.find(i => i.nombre_invitado === e.target.dataset.nombre);
                input.value = inv.nombre_invitado;
                box.style.display = 'none';
                b.querySelector('.datos-extra').style.display = 'block';
                b.querySelector('.seccion-pareja').style.display = (parseInt(inv.permite_pareja) === 1) ? 'block' : 'none';
            };
            b.querySelector('.check-pareja').onchange = function() { this.nextElementSibling.style.display = this.checked ? 'block' : 'none'; };
        }

        document.getElementById('btn-solo').onclick = () => { 
            const d = document.getElementById('lista-invitados-dinamica'); d.innerHTML = crearBloque(); setupBloque(d.firstChild); 
            document.getElementById('rsvpForm').style.display='block'; document.getElementById('btn-agregar').style.display='none'; 
        };
        document.getElementById('btn-grupo').onclick = () => { 
            const d = document.getElementById('lista-invitados-dinamica'); d.innerHTML = crearBloque(); setupBloque(d.firstChild); 
            document.getElementById('rsvpForm').style.display='block'; document.getElementById('btn-agregar').style.display='block'; 
        };
        document.getElementById('btn-agregar').onclick = () => { 
            const d = document.getElementById('lista-invitados-dinamica'); d.insertAdjacentHTML('beforeend', crearBloque()); setupBloque(d.lastChild); 
        };

        document.getElementById('rsvpForm').onsubmit = function(e) {
            e.preventDefault();
            for(let b of document.querySelectorAll('.bloque-invitado')) {
                if(!listaInvitadosGlobal.find(i => i.nombre_invitado === b.querySelector('.nombre-buscar').value)) { 
                    alert("Nombre no válido. Selecciona uno de la lista."); return; 
                }
            }
            alert("Confirmación enviada con éxito.");
            location.reload();
        };
    </script>
</body>
</html>
