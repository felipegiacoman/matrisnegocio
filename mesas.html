<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Organizador de Mesas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f1ea; font-family: 'Montserrat', sans-serif; }
        .mesa-card { background: white; border-radius: 8px; border-top: 4px solid #b59a7a; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; transition: 0.2s;}
        .mesa-novios { border-top: 4px solid #d4af37; background: #fffcf5; }
        .guest-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .guest-item:last-child { border-bottom: none; }
        .btn-gold { background: #b59a7a; color: white; border: none; }
        .btn-gold:hover { background: #2d2d2d; color: white; }
        .action-icon { cursor: pointer; color: #888; transition: 0.2s; font-size: 1.1rem;}
        .action-icon:hover { color: #2d2d2d; }
        .trash-icon:hover { color: #dc3545; }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <h2 class="mb-4" style="font-family: 'Playfair Display', serif;">Gestor de Mesas (Novios)</h2>
        
        <div class="row">
            <!-- PANEL IZQUIERDO: COMENSALES SIN ASIGNAR -->
            <div class="col-md-3">
                <div class="bg-white p-3 rounded shadow-sm">
                    <h5 class="mb-3">Por Asignar (<span id="count-sin-asignar">0</span>)</h5>
                    <div id="lista-sin-asignar" style="max-height: 70vh; overflow-y: auto;">Cargando...</div>
                </div>
            </div>

            <!-- PANEL DERECHO: MESAS -->
            <div class="col-md-9">
                <div class="d-flex flex-wrap gap-3 mb-4 bg-white p-3 rounded shadow-sm align-items-end">
                    <div>
                        <label class="small fw-bold">Capacidad nueva mesa</label>
                        <select id="nueva-mesa-cap" class="form-select form-select-sm">
                            <option value="10">10 personas</option>
                            <option value="8">8 personas</option>
                        </select>
                    </div>
                    <button class="btn btn-gold btn-sm" onclick="crearMesaNormal()">+ Agregar Mesa</button>
                    
                    <div class="ms-auto border-start ps-3">
                        <button class="btn btn-outline-dark btn-sm" onclick="crearMesaNovios()"><i class="bi bi-star-fill text-warning me-1"></i>Crear Mesa Novios</button>
                    </div>
                </div>
                
                <div class="row" id="contenedor-mesas"></div>
            </div>
        </div>
    </div>

    <script>
        let SCRIPT_URL = "";
        let dataConfirmados = [];
        let dataMesas = [];

        async function init() {
            const cfg = await (await fetch('config.json')).json();
            SCRIPT_URL = cfg.worker_url;
            await recargarDatos();
        }

        async function recargarDatos() {
            const [resConf, resMesas] = await Promise.all([fetch(SCRIPT_URL + "?action=confirmados"), fetch(SCRIPT_URL + "?action=mesas")]);
            dataConfirmados = await resConf.json();
            dataMesas = await resMesas.json();
            dibujarInterfaz();
        }

        function calcularSillasOcupadas(invitado) {
            return (invitado.lleva_pareja === "Sí" && invitado.nombre_pareja && invitado.nombre_pareja !== "-" && invitado.nombre_pareja.toLowerCase() !== "pendiente") ? 2 : 1;
        }

        function dibujarInterfaz() {
            // Arreglo del bug del "0": Ahora valida estrictamente nulos o vacíos
            const sinAsignar = dataConfirmados.filter(c => c.mesa_numero === null || c.mesa_numero === "");
            let totalSinAsignarSillas = 0;
            let htmlSinAsignar = "";
            
            sinAsignar.forEach(c => {
                const sillas = calcularSillasOcupadas(c);
                totalSinAsignarSillas += sillas;
                htmlSinAsignar += `<div class="guest-item">
                    <div><strong>${c.nombre_invitado}</strong> ${sillas === 2 ? '<span class="badge bg-secondary">+ Pareja</span>' : ''}</div>
                </div>`;
            });
            document.getElementById('count-sin-asignar').innerText = totalSinAsignarSillas;
            document.getElementById('lista-sin-asignar').innerHTML = htmlSinAsignar || "<p class='text-muted small'>Todos tienen mesa asignada.</p>";

            let htmlMesas = "";
            dataMesas.forEach(mesa => {
                // Validación estricta para asegurar que el "0" no se escape
                const ocupantes = dataConfirmados.filter(c => c.mesa_numero !== null && c.mesa_numero !== "" && parseInt(c.mesa_numero) === parseInt(mesa.numero));
                let sillasOcupadas = 0;
                let htmlOcupantes = "";
                
                ocupantes.forEach(c => {
                    const sillas = calcularSillasOcupadas(c);
                    sillasOcupadas += sillas;
                    htmlOcupantes += `<div class="guest-item">
                        <span>${c.nombre_invitado} ${sillas === 2 ? '(+1)' : ''}</span>
                        <button class="btn btn-sm text-danger p-0 m-0" onclick="asignarMesa('${c.nombre_invitado}', null)"><i class="bi bi-x-circle"></i></button>
                    </div>`;
                });

                const esMesaNovios = parseInt(mesa.capacidad) === 999;
                const llena = !esMesaNovios && (sillasOcupadas >= mesa.capacidad);
                
                let badgeHtml = esMesaNovios 
                    ? `<span class="badge bg-info text-dark">${sillasOcupadas} en mesa</span>`
                    : `<span class="badge ${llena ? 'bg-danger' : 'bg-success'}">${sillasOcupadas} / ${mesa.capacidad}</span>`;

                let opcionesSinAsignar = `<option value="">+ Agregar invitado...</option>`;
                sinAsignar.forEach(c => {
                    opcionesSinAsignar += `<option value="${c.nombre_invitado}">${c.nombre_invitado} (${calcularSillasOcupadas(c)} sillas)</option>`;
                });

                htmlMesas += `
                <div class="col-md-4">
                    <div class="mesa-card ${esMesaNovios ? 'mesa-novios' : ''}">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="d-flex align-items-center gap-2">
                                <h6 class="m-0 fw-bold">${esMesaNovios ? 'Mesa Novios (0)' : `Mesa ${mesa.numero}`}</h6>
                                ${!esMesaNovios ? `<i class="bi bi-pencil-square action-icon" title="Cambiar Número" onclick="cambiarNumero(${mesa.numero})"></i>` : ''}
                                <i class="bi bi-trash action-icon trash-icon" title="Eliminar Mesa" onclick="eliminarMesa(${mesa.numero})"></i>
                            </div>
                            ${badgeHtml}
                        </div>
                        <div class="mb-3" style="min-height: 100px; max-height: 250px; overflow-y: auto;">
                            ${htmlOcupantes || '<span class="text-muted small">Mesa vacía</span>'}
                        </div>
                        <select class="form-select form-select-sm" onchange="intentarAsignar(this.value, ${mesa.numero}, ${mesa.capacidad}, ${sillasOcupadas})">
                            ${opcionesSinAsignar}
                        </select>
                    </div>
                </div>`;
            });
            document.getElementById('contenedor-mesas').innerHTML = htmlMesas;
        }

        // LÓGICA DE NÚMEROS INTELIGENTES
        function obtenerSiguienteNumero() {
            const numeros = dataMesas.map(m => parseInt(m.numero)).filter(n => n > 0).sort((a,b) => a-b);
            let proximo = 1;
            for (let i = 0; i < numeros.length; i++) {
                if (numeros[i] === proximo) proximo++;
                else break; // Encontró un hueco
            }
            return proximo;
        }

        async function crearMesaNormal() {
            const cap = document.getElementById('nueva-mesa-cap').value;
            const num = obtenerSiguienteNumero();
            await crearMesa(num, cap);
        }

        async function crearMesaNovios() {
            if(dataMesas.some(m => parseInt(m.numero) === 0)) return alert("La Mesa de Novios ya existe.");
            await crearMesa(0, 999);
        }

        async function crearMesa(num, cap) {
            // Actualización optimista local
            dataMesas.push({ numero: num, capacidad: cap });
            dibujarInterfaz(); 
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ tipo: "guardar_mesa", numero: num, capacidad: cap }) });
            recargarDatos();
        }

        async function eliminarMesa(num) {
            if(!confirm(`¿Estás seguro de eliminar la Mesa ${num}? Los invitados volverán a la lista de "Por Asignar".`)) return;
            // Actualización optimista
            dataMesas = dataMesas.filter(m => parseInt(m.numero) !== parseInt(num));
            dataConfirmados.forEach(c => { if(parseInt(c.mesa_numero) === parseInt(num)) c.mesa_numero = null; });
            dibujarInterfaz();

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ tipo: "eliminar_mesa", numero: num }) });
        }

        async function cambiarNumero(viejoNum) {
            const nuevoNum = prompt(`Cambiar Mesa ${viejoNum} al número:`);
            if(!nuevoNum || isNaN(nuevoNum) || parseInt(nuevoNum) === parseInt(viejoNum)) return;
            
            if(dataMesas.some(m => parseInt(m.numero) === parseInt(nuevoNum))) return alert("Ese número de mesa ya está en uso.");

            // Actualización optimista
            const mesa = dataMesas.find(m => parseInt(m.numero) === parseInt(viejoNum));
            if(mesa) mesa.numero = nuevoNum;
            dataConfirmados.forEach(c => { if(parseInt(c.mesa_numero) === parseInt(viejoNum)) c.mesa_numero = nuevoNum; });
            dibujarInterfaz();

            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ tipo: "cambiar_numero_mesa", viejo_numero: viejoNum, nuevo_numero: nuevoNum }) });
            const data = await res.json();
            if(data.error) { alert(data.error); recargarDatos(); }
        }

        function intentarAsignar(nombreInvitado, mesaNum, capMax, capActual) {
            if(!nombreInvitado) return;
            const invitado = dataConfirmados.find(c => c.nombre_invitado === nombreInvitado);
            const sillas = calcularSillasOcupadas(invitado);
            
            if(parseInt(capMax) !== 999 && (capActual + sillas > capMax)) {
                alert(`¡Atención! Faltan sillas. Esta persona ocupa ${sillas} lugares y solo quedan ${capMax - capActual} disponibles.`);
                dibujarInterfaz(); // Resetea el desplegable
                return;
            }
            asignarMesa(nombreInvitado, mesaNum);
        }

        async function asignarMesa(nombre, mesaNum) {
            // INTERFAZ OPTIMISTA: Modifica los datos localmente al instante y dibuja sin esperar a la Base de Datos
            const invitado = dataConfirmados.find(c => c.nombre_invitado === nombre);
            if(invitado) invitado.mesa_numero = mesaNum;
            dibujarInterfaz();

            // Envía a la base de datos en segundo plano
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ tipo: "asignar_mesa", nombre_invitado: nombre, mesa_numero: mesaNum }) });
        }

        init();
    </script>
</body>
</html>
