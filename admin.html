<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Banquetería - Matrimonio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f1ea; font-family: 'Montserrat', sans-serif; }
        
        .stat-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #b59a7a; height: 100%; display: flex; flex-direction: column; justify-content: center; transition: 0.3s;}
        .stat-card.static { border-top-color: #2d2d2d; cursor: default; }
        
        /* Efectos para tarjetas filtrables */
        .stat-card.filtrable { cursor: pointer; }
        .stat-card.filtrable:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stat-card.active-filter { background: #b59a7a; color: white; border-top: 4px solid #2d2d2d; }
        .stat-card.active-filter h6, .stat-card.active-filter .stat-val { color: white !important; }
        
        .stat-val { font-size: 1.8rem; font-weight: bold; color: #2d2d2d; }
        .table-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .badge-adulto { background-color: #b59a7a; color: white; }
        .badge-nino { background-color: #8c775e; color: white; }
        
        @media (min-width: 768px) {
            .table-container { padding: 30px; }
            .stat-card { padding: 20px; }
            .stat-val { font-size: 2rem; }
        }
    </style>
</head>
<body class="p-3 p-md-5">
    <div class="container-fluid container-md">
        
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">
            <h2 class="m-0 text-center text-md-start" style="font-family: 'Playfair Display', serif; color: #2d2d2d;">Panel de Banquetería</h2>
            <button class="btn btn-outline-dark btn-sm fw-bold px-4" onclick="renderTabla('Todas')">Ver a Todos los Invitados</button>
        </div>
        
        <!-- CONTADORES GLOBALES -->
        <div class="row g-2 g-md-3 mb-4">
            <!-- Adultos sigue siendo estático -->
            <div class="col-6 col-md-3"><div class="stat-card static"><h6>Total Adultos</h6><div class="stat-val" id="adult-val">0</div></div></div>
            <!-- Niños ahora es un filtro interactivo -->
            <div class="col-6 col-md-3"><div class="stat-card filtrable" id="card-ninos" onclick="renderTabla('Niños')"><h6>Total Niños</h6><div class="stat-val" id="nino-val">0</div></div></div>
        </div>

        <h5 class="mb-3" style="font-family: 'Playfair Display', serif;">Resumen de Platos Especiales <small class="text-muted fs-6 font-monospace">(Haz clic para filtrar)</small></h5>
        
        <!-- CONTENEDOR DINÁMICO DE RESTRICCIONES -->
        <div class="row g-2 g-md-3 mb-4" id="contenedor-dietas">
            <!-- Las tarjetas se generan aquí con JavaScript -->
        </div>

        <div class="table-container">
            <h4 class="mb-3" id="titulo-tabla" style="font-family: 'Playfair Display', serif;">Todos los Comensales</h4>
            <div class="table-responsive">
                <table class="table table-hover align-middle border text-nowrap">
                    <thead class="table-light">
                        <tr>
                            <th>Nombre del Comensal</th>
                            <th>Mesa</th>
                            <th>Restricción Alimentaria</th>
                            <th>Tipo de Menú</th>
                        </tr>
                    </thead>
                    <tbody id="lista-tabla">
                        <tr><td colspan="4" class="text-center text-muted">Cargando datos desde la base de datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let todosLosComensales = [];
        let tarjetasDietas = [];

        async function cargarPanel() {
            try {
                const cfg = await (await fetch('config.json')).json();
                const [resConf, resMaestra] = await Promise.all([
                    fetch(cfg.worker_url + "?action=confirmados"),
                    fetch(cfg.worker_url + "?action=lista")
                ]);
                const confirmados = await resConf.json();
                const maestra = await resMaestra.json();

                let adultos = 0;
                let ninos = 0;
                let dietasDinamicas = {};

                // Procesar datos
                confirmados.forEach(p => {
                    // Procesar Principal
                    const infoMaestra = maestra.find(m => m.nombre === p.nombre_invitado);
                    const esNino = infoMaestra ? (infoMaestra.nino === 1) : false;
                    const mesaStr = p.mesa_numero ? `Mesa ${p.mesa_numero}` : `<span class="text-danger small">Sin mesa</span>`;
                    
                    if (esNino) ninos++; else adultos++;
                    
                    let dietaPrin = (p.dieta && p.dieta !== "-") ? p.dieta : "Ninguna";
                    if (dietaPrin !== "Ninguna") dietasDinamicas[dietaPrin] = (dietasDinamicas[dietaPrin] || 0) + 1;

                    todosLosComensales.push({ nombre: p.nombre_invitado, mesa: mesaStr, dieta: dietaPrin, esNino: esNino });

                    // Procesar Pareja
                    if (p.lleva_pareja === "Sí" && p.nombre_pareja && p.nombre_pareja !== "-" && p.nombre_pareja.toLowerCase() !== "pendiente") {
                        adultos++;
                        let dietaPar = (p.dieta_pareja && p.dieta_pareja !== "-") ? p.dieta_pareja : "Ninguna";
                        if (dietaPar !== "Ninguna") dietasDinamicas[dietaPar] = (dietasDinamicas[dietaPar] || 0) + 1;
                        
                        todosLosComensales.push({ nombre: p.nombre_pareja, mesa: mesaStr, dieta: dietaPar, esNino: false });
                    }
                });

                document.getElementById('adult-val').innerText = adultos;
                document.getElementById('nino-val').innerText = ninos;
                
                // Generar tarjetas dinámicas de dietas de forma segura
                const contenedorDietas = document.getElementById('contenedor-dietas');
                contenedorDietas.innerHTML = "";
                tarjetasDietas = [];

                if (Object.keys(dietasDinamicas).length === 0) {
                    contenedorDietas.innerHTML = `<div class="col-12"><p class="text-muted small">Aún no hay invitados con restricciones alimentarias especiales.</p></div>`;
                }

                for (const [dieta, cantidad] of Object.entries(dietasDinamicas)) {
                    const col = document.createElement('div');
                    col.className = 'col-6 col-md-3 col-lg-2';
                    
                    const card = document.createElement('div');
                    card.className = 'stat-card filtrable';
                    
                    card.onclick = () => renderTabla(dieta);
                    tarjetasDietas.push({ elemento: card, nombreDieta: dieta });

                    const title = document.createElement('h6');
                    title.className = 'small fw-bold text-truncate m-0 mb-2';
                    title.title = dieta;
                    title.innerText = dieta;

                    const val = document.createElement('div');
                    val.className = 'stat-val';
                    val.innerText = cantidad;

                    card.appendChild(title);
                    card.appendChild(val);
                    col.appendChild(card);
                    contenedorDietas.appendChild(col);
                }

                // Mostrar todo al iniciar
                renderTabla('Todas');

            } catch(e) { 
                console.error(e);
                document.getElementById('lista-tabla').innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error de conexión. Recarga la página.</td></tr>`;
            }
        }

        function renderTabla(filtro) {
            // Actualizar diseño de las tarjetas de restricciones
            tarjetasDietas.forEach(t => {
                if(filtro !== 'Todas' && filtro !== 'Niños' && t.nombreDieta === filtro) {
                    t.elemento.classList.add('active-filter');
                } else {
                    t.elemento.classList.remove('active-filter');
                }
            });

            // Actualizar diseño de la tarjeta de Niños
            const cardNinos = document.getElementById('card-ninos');
            if (filtro === 'Niños') {
                cardNinos.classList.add('active-filter');
            } else {
                cardNinos.classList.remove('active-filter');
            }
            
            // Actualizar título de la tabla
            if (filtro === 'Todas') {
                document.getElementById('titulo-tabla').innerText = 'Todos los Comensales';
            } else if (filtro === 'Niños') {
                document.getElementById('titulo-tabla').innerText = 'Filtrando por: Menú Infantil (Niños)';
            } else {
                document.getElementById('titulo-tabla').innerText = `Filtrando por: ${filtro}`;
            }

            // Filtrar listado de comensales
            let filtrados = todosLosComensales;
            if (filtro === 'Niños') {
                filtrados = todosLosComensales.filter(c => c.esNino);
            } else if (filtro !== 'Todas') {
                filtrados = todosLosComensales.filter(c => c.dieta === filtro);
            }

            // Dibujar tabla (Protegido contra XSS)
            let html = "";
            filtrados.forEach(c => {
                html += `<tr>
                    <td><strong>${escapeHTML(c.nombre)}</strong></td>
                    <td>${c.mesa}</td>
                    <td>${escapeHTML(c.dieta)}</td>
                    <td><span class="badge ${c.esNino ? 'badge-nino' : 'badge-adulto'}">${c.esNino ? 'Niño' : 'Adulto'}</span></td>
                </tr>`;
            });
            
            document.getElementById('lista-tabla').innerHTML = html || `<tr><td colspan="4" class="text-center text-muted">No hay comensales en esta categoría.</td></tr>`;
        }

        // Función de seguridad por si algún invitado escribe código HTML en "Otro"
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        cargarPanel();
    </script>
</body>
</html>
