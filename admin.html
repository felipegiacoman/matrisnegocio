<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Banquetería - Matrimonio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f1ea; font-family: 'Montserrat', sans-serif; }
        .stat-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #b59a7a; height: 100%; }
        .stat-val { font-size: 2rem; font-weight: bold; color: #2d2d2d; }
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .badge-adulto { background-color: #b59a7a; color: white; }
        .badge-nino { background-color: #8c775e; color: white; }
    </style>
</head>
<body class="p-4 p-md-5">
    <div class="container">
        <h2 class="mb-4 text-center" style="font-family: 'Playfair Display', serif; color: #2d2d2d;">Asistencia y Dietas (En Vivo)</h2>
        
        <div class="row g-3 mb-5" id="stats-container">
            <div class="col-6 col-md-2"><div class="stat-card"><h6>Adultos</h6><div class="stat-val" id="adult-val">0</div></div></div>
            <div class="col-6 col-md-2"><div class="stat-card"><h6>Niños</h6><div class="stat-val" id="nino-val">0</div></div></div>
            
            <div class="col-12 col-md-1 d-none d-md-flex align-items-center justify-content-center">
                <div style="width: 2px; height: 100%; background: #ddd;"></div>
            </div>

            <div class="col-4 col-md-2"><div class="stat-card"><h6>Veganos</h6><div class="stat-val" id="veg-val">0</div></div></div>
            <div class="col-4 col-md-2"><div class="stat-card"><h6>Vegetarianos</h6><div class="stat-val" id="vet-val">0</div></div></div>
            <div class="col-4 col-md-2"><div class="stat-card"><h6>Celiacos</h6><div class="stat-val" id="cel-val">0</div></div></div>
        </div>

        <div class="table-container">
            <h4 class="mb-4" style="font-family: 'Playfair Display', serif;">Listado de Comensales</h4>
            <div class="table-responsive">
                <table class="table table-hover align-middle border">
                    <thead class="table-light">
                        <tr>
                            <th>Nombre del Comensal</th>
                            <th>Restricción Alimentaria</th>
                            <th>Tipo de Menú</th>
                        </tr>
                    </thead>
                    <tbody id="lista-tabla">
                        <tr><td colspan="3" class="text-center text-muted">Cargando datos desde la base de datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function cargarPanel() {
            try {
                // 1. Obtener configuración y datos
                const cfg = await (await fetch('config.json')).json();
                const [resConf, resMaestra] = await Promise.all([
                    fetch(cfg.worker_url + "?action=confirmados"),
                    fetch(cfg.worker_url + "?action=lista")
                ]);
                const confirmados = await resConf.json();
                const maestra = await resMaestra.json();

                // 2. Inicializar contadores
                let adultos = 0;
                let ninos = 0;
                let dietas = { 'Vegano': 0, 'Vegetariano': 0, 'Celiaco': 0 };
                let html = "";

                // 3. Procesar datos
                confirmados.forEach(p => {
                    // --- PROCESAR INVITADO PRINCIPAL ---
                    // Buscar en la lista maestra si es niño
                    const infoMaestra = maestra.find(m => m.nombre === p.nombre_invitado);
                    const esNino = infoMaestra ? (infoMaestra.nino === 1) : false;
                    
                    if (esNino) ninos++; else adultos++;
                    
                    // Sumar dieta del invitado principal
                    if (dietas.hasOwnProperty(p.dieta)) dietas[p.dieta]++;

                    // Fila HTML del invitado principal
                    html += `<tr>
                        <td><strong>${p.nombre_invitado}</strong></td>
                        <td>${p.dieta || 'Ninguna'}</td>
                        <td><span class="badge ${esNino ? 'badge-nino' : 'badge-adulto'}">${esNino ? 'Niño' : 'Adulto'}</span></td>
                    </tr>`;

                    // --- PROCESAR PAREJA (COMO COMENSAL INDEPENDIENTE) ---
                    // Verifica que lleve pareja, y que haya ingresado un nombre válido (que no sea "-", ni "Pendiente")
                    if (p.lleva_pareja === "Sí" && p.nombre_pareja && p.nombre_pareja !== "-" && p.nombre_pareja.toLowerCase() !== "pendiente") {
                        
                        adultos++; // Toda pareja se asume como menú de adulto
                        
                        // Sumar dieta de la pareja
                        if (dietas.hasOwnProperty(p.dieta_pareja)) dietas[p.dieta_pareja]++;
                        
                        // Fila HTML de la pareja (aparece inmediatamente abajo, sin decir que es pareja)
                        html += `<tr>
                            <td><strong>${p.nombre_pareja}</strong></td>
                            <td>${p.dieta_pareja || 'Ninguna'}</td>
                            <td><span class="badge badge-adulto">Adulto</span></td>
                        </tr>`;
                    }
                });

                // 4. Inyectar resultados en la pantalla
                document.getElementById('adult-val').innerText = adultos;
                document.getElementById('nino-val').innerText = ninos;
                document.getElementById('veg-val').innerText = dietas['Vegano'];
                document.getElementById('vet-val').innerText = dietas['Vegetariano'];
                document.getElementById('cel-val').innerText = dietas['Celiaco'];
                
                if (html === "") {
                    document.getElementById('lista-tabla').innerHTML = `<tr><td colspan="3" class="text-center text-muted">Aún no hay invitados confirmados.</td></tr>`;
                } else {
                    document.getElementById('lista-tabla').innerHTML = html;
                }

            } catch(e) { 
                console.error("Error al cargar los datos:", e); 
                document.getElementById('lista-tabla').innerHTML = `<tr><td colspan="3" class="text-center text-danger">Error de conexión. Por favor recarga la página.</td></tr>`;
            }
        }
        
        cargarPanel();
    </script>
</body>
</html>
