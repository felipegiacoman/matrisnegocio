<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración — Matrimonio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <h2 class="mb-4">Panel de Invitados Confirmados</h2>
        <div class="row" id="stats"></div>
        <div class="mt-4 p-3 bg-white shadow-sm">
            <table class="table">
                <thead><tr><th>Invitado</th><th>Pareja</th><th>Dieta Invitado</th><th>Dieta Pareja</th></tr></thead>
                <tbody id="lista-invitados"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadAdmin() {
            const cfg = await (await fetch('config.json')).json();
            const res = await fetch(cfg.worker_url + "?all=true"); // Asegúrate que tu worker soporte traer todos los confirmados
            const data = await res.json();
            
            let total = 0, diets = { 'Ninguna': 0, 'Vegano': 0, 'Vegetariano': 0, 'Celiaco': 0 };
            let html = "";

            data.forEach(i => {
                total += 1 + (i.lleva_pareja === "Sí" ? 1 : 0);
                diets[i.dieta] = (diets[i.dieta] || 0) + 1;
                if(i.lleva_pareja === "Sí") diets[i.dieta_pareja] = (diets[i.dieta_pareja] || 0) + 1;
                
                html += `<tr><td>${i.nombre_invitado}</td><td>${i.nombre_pareja}</td><td>${i.dieta}</td><td>${i.dieta_pareja}</td></tr>`;
            });

            document.getElementById('stats').innerHTML = `<div class="col-md-3"><h5>Total Personas</h5><h2>${total}</h2></div>` + 
                Object.keys(diets).map(d => `<div class="col-md-2"><h5>${d}</h5><h2>${diets[d]}</h2></div>`).join('');
            document.getElementById('lista-invitados').innerHTML = html;
        }
        loadAdmin();
    </script>
</body>
</html>
