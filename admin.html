<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Banquetería - Matrimonio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f1ea; font-family: sans-serif; }
        .stat-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #b59a7a; }
        .stat-val { font-size: 1.8rem; font-weight: bold; color: #2d2d2d; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <h2 class="mb-4 text-center">Resumen de Asistencia (En Vivo)</h2>
        <div class="row g-3 mb-5" id="stats-container">
            <div class="col-md-3"><div class="stat-card"><h5>Adultos</h5><div class="stat-val" id="adult-val">0</div></div></div>
            <div class="col-md-3"><div class="stat-card"><h5>Niños</h5><div class="stat-val" id="nino-val">0</div></div></div>
            <div class="col-md-3"><div class="stat-card"><h5>Veganos</h5><div class="stat-val" id="veg-val">0</div></div></div>
            <div class="col-md-3"><div class="stat-card"><h5>Celiacos</h5><div class="stat-val" id="cel-val">0</div></div></div>
        </div>

        <div class="bg-white p-4 rounded shadow-sm">
            <h4>Detalle de Invitados</h4>
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr><th>Nombre</th><th>Restricción</th><th>Tipo</th></tr>
                </thead>
                <tbody id="lista-tabla"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function cargarPanel() {
            try {
                const cfg = await (await fetch('config.json')).json();
                const [resConf, resMaestra] = await Promise.all([
                    fetch(cfg.worker_url + "?action=confirmados"),
                    fetch(cfg.worker_url + "?action=lista")
                ]);
                const confirmados = await resConf.json();
                const maestra = await resMaestra.json();

                let adultos = 0, ninos = 0, dietas = { 'Vegano': 0, 'Celiaco': 0 };
                let html = "";

                confirmados.forEach(p => {
                    // 1. Procesar Invitado Principal
                    const infoMaestra = maestra.find(m => m.nombre === p.nombre_invitado);
                    const esNino = infoMaestra ? infoMaestra.nino === 1 : false;
                    
                    if (esNino) ninos++; else adultos++;
                    if(dietas.hasOwnProperty(p.dieta)) dietas[p.dieta]++;

                    html += `<tr>
                        <td><strong>${p.nombre_invitado}</strong></td>
                        <td>${p.dieta}</td>
                        <td><span class="badge ${esNino ? 'bg-info' : 'bg-primary'}">${esNino ? 'Niño' : 'Adulto'}</span></td>
                    </tr>`;

                    // 2. Procesar Pareja (Si existe nombre)
                    if (p.lleva_pareja === "Sí" && p.nombre_pareja && p.nombre_pareja !== "-" && p.nombre_pareja !== "Pendiente") {
                        adultos++; // Asumimos pareja es adulto
                        if(dietas.hasOwnProperty(p.dieta_pareja)) dietas[p.dieta_pareja]++;
                        
                        html += `<tr>
                            <td><strong>${p.nombre_pareja}</strong> (Pareja de ${p.nombre_invitado})</td>
                            <td>${p.dieta_pareja || 'Ninguna'}</td>
                            <td><span class="badge bg-primary">Adulto</span></td>
                        </tr>`;
                    }
                });

                document.getElementById('adult-val').innerText = adultos;
                document.getElementById('nino-val').innerText = ninos;
                document.getElementById('veg-val').innerText = dietas['Vegano'];
                document.getElementById('cel-val').innerText = dietas['Celiaco'];
                document.getElementById('lista-tabla').innerHTML = html;
            } catch(e) { console.error("Error:", e); }
        }
        cargarPanel();
    </script>
</body>
</html>
