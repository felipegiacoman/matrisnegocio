<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Banquetería - Matrimonio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: sans-serif; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { color: #b59a7a; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <h2 class="mb-4">Resumen para Banquetería</h2>
        
        <div class="row" id="stats-container">
            <!-- Aquí se cargarán las tarjetas de resumen -->
        </div>

        <div class="card mt-4 p-4">
            <h4>Detalle de Invitados</h4>
            <table class="table table-hover mt-3">
                <thead>
                    <tr><th>Invitado</th><th>Pareja</th><th>Restricción Invitado</th><th>Restricción Pareja</th></tr>
                </thead>
                <tbody id="lista-tabla"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function cargarPanel() {
            const cfg = await (await fetch('config.json')).json();
            // Solicitamos todos los confirmados al Worker
            const res = await fetch(cfg.worker_url + "?action=confirmados");
            const data = await res.json();

            let totalAdultos = 0, totalNinos = 0, dietas = { 'Ninguna': 0, 'Vegano': 0, 'Vegetariano': 0, 'Celiaco': 0 };

            let html = "";
            data.forEach(p => {
                // Sumar dietas
                if(dietas.hasOwnProperty(p.dieta)) dietas[p.dieta]++;
                if(p.lleva_pareja === "Sí" && dietas.hasOwnProperty(p.dieta_pareja)) dietas[p.dieta_pareja]++;

                // Calcular totales (si tienes una forma de identificar niños, aquí se ajusta)
                totalAdultos++; 
                if(p.lleva_pareja === "Sí") totalAdultos++;

                html += `<tr><td>${p.nombre_invitado}</td><td>${p.nombre_pareja}</td><td>${p.dieta}</td><td>${p.dieta_pareja}</td></tr>`;
            });

            // Dibujar tarjetas de resumen
            document.getElementById('stats-container').innerHTML = `
                <div class="col-md-3"><div class="card p-3"><h5>Total Personas</h5><h3>${totalAdultos}</h3></div></div>
                <div class="col-md-3"><div class="card p-3"><h5>Veganos</h5><h3>${dietas['Vegano']}</h3></div></div>
                <div class="col-md-3"><div class="card p-3"><h5>Vegetarianos</h5><h3>${dietas['Vegetariano']}</h3></div></div>
                <div class="col-md-3"><div class="card p-3"><h5>Celiacos</h5><h3>${dietas['Celiaco']}</h3></div></div>
            `;
            document.getElementById('lista-tabla').innerHTML = html;
        }
        cargarPanel();
    </script>
</body>
</html>
